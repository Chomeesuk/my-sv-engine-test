<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://sharevalue.github.io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉐어밸류 - 부킹엔진 (Vibe Coding)</title>
    
    <link rel="stylesheet" href="https://sharevalue.github.io/assets/index.66316279.css">
    
    <style>
      /* 🚫 레거시 동영상을 강제로 숨깁니다 */
      video, .video-background, .video-container {
        display: none !important;
      }

      /* ✨ 동영상 대신 들어갈 세련된 배경과 텍스트 설정 */
      .vibe-hero-section {
        height: 80vh; /* 화면의 80% 정도 높이 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #f8f9fa 0%, #e6f7fd 100%);
        text-align: center;
        padding-top: 80px;
      }

      .vibe-title {
        font-size: 3.5rem;
        font-weight: 800;
        color: #152038;
        line-height: 1.3;
        margin-bottom: 24px;
        animation: fadeIn 1s ease-out;
      }

      .vibe-subtitle {
        font-size: 1.5rem;
        color: #5b6e81;
        margin-bottom: 48px;
        animation: fadeIn 1.5s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="vibe-hero-section">
        <h1 class="vibe-title">
          동영상 없이 더 빠르고 세련된<br>
          <span style="color: #00b0ec;">쉐어밸류 부킹엔진</span>
        </h1>
        <p class="vibe-subtitle">
          불필요한 레거시는 덜어내고, 본질에 집중합니다.<br>
          지금 가장 트렌디한 여행 비즈니스를 만나보세요.
        </p>
        </div>
    </div>

    <script type="module" crossorigin src="https://sharevalue.github.io/assets/index.b271c582.js"></script>
  </body>
</html>
