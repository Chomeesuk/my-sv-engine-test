    <title>쉐어밸류 - 부킹엔진</title>
    
    <link rel="stylesheet" href="https://sharevalue.github.io/assets/index.66316279.css">
    
    <style>
      /* 🚫 원래 있던 레거시 동영상과 그 배경만 마법처럼 투명하게 숨깁니다 */
      video, 
      .video-background, 
      .video-container, 
      .main-video,
      section video {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
      }

      /* 🎨 동영상이 사라진 빈 공간을 대표님이 원하신 세련된 파란색 계열 배경으로 채우기 */
      section {
        background: linear-gradient(135deg, #ffffff 0%, #e6f7fd 100%) !important;
      }
    </style>
  </head>

    <div id="app"></div>
