<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://sharevalue.github.io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉐어밸류 - 부킹엔진 (Vibe Coding)</title>
    
    <link rel="stylesheet" href="https://sharevalue.github.io/assets/index.66316279.css">
    
    <style>
      /* 🚫 동영상 태그 및 동영상 배경 영역을 완전히 숨깁니다 */
      video, 
      .video-background, 
      .video-container, 
      .main-video,
      section video {
        display: none !important;
      }

      /* ✍️ 동영상 대신 들어갈 대표님만의 세련된 문구 디자인 */
      .vibe-new-box {
        padding: 80px 20px;
        text-align: center;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        margin: 40px auto;
        max-width: 800px;
      }
      .vibe-new-title {
        font-size: 2.8rem !important;
        font-weight: 800 !important;
        color: #152038 !important;
        line-height: 1.4 !important;
        margin-bottom: 20px !important;
      }
      .vibe-new-subtitle {
        font-size: 1.3rem !important;
        color: #5b6e81 !important;
        line-height: 1.6 !important;
      }
    </style>
  </head>
  <body>
    
    <div id="app"></div>

    <script type="module" crossorigin src="https://sharevalue.github.io/assets/index.b271c582.js"></script>

    <script>
      function replaceVideoWithText() {
        // 기존 동영상이 들어있는 섹션이나 박스를 찾습니다.
        const targetSection = document.querySelector('section') || document.querySelector('.video-container');
        
        if (targetSection) {
          // 동영상 섹션 내부를 대표님의 세련된 텍스트 박스로 강제 교체합니다!
          targetSection.innerHTML = `
            <div class="vibe-new-box">
              <h1 class="vibe-new-title">
                더 가볍고 세련되게 진화한<br>
                <span style="color: #00b0ec;">쉐어밸류 차세대 부킹엔진</span>
              </h1>
              <p class="vibe-new-subtitle">
                정신없던 레거시 동영상을 걷어내고 본질만 담았습니다.<br>
                대표님이 직접 리드하는 바이브 코딩 실험실입니다.
              </p>
            </div>
          `;
          // 숨겨졌던 동영상 잔재들을 한 번 더 확실히 지웁니다.
          const videos = document.querySelectorAll('video');
          videos.forEach(v => v.remove());
        } else {
          // 화면이 아직 안 그려졌으면 0.1초 뒤에 다시 시도합니다.
          setTimeout(replaceVideoWithText, 100);
        }
      }

      // 화면 로딩 시작 시 실행
      window.addEventListener('DOMContentLoaded', replaceVideoWithText);
      window.addEventListener('load', replaceVideoWithText);
    </script>
  </body>
</html>
