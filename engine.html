<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://sharevalue.github.io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쉐어밸류 - 부킹엔진 (Vibe Coding)</title>
    
    <link rel="stylesheet" href="https://sharevalue.github.io/assets/index.66316279.css">
    
    <style>
      /* 🚫 레거시 동영상 영역 강제 완전 삭제 */
      video, .video-background, .video-container, .main-video {
        display: none !important;
      }

      /* ✍️ 대표님이 원하는 새로운 문구를 위한 스타일 고정 */
      .vibe-fixed-hero {
        position: relative;
        z-index: 9999 !important; /* 기존 시스템보다 무조건 위에 띄우기 */
        padding: 100px 20px;
        text-align: center;
        background: #ffffff; /* 깔끔한 화이트 배경 */
        margin-top: 100px;
      }

      .vibe-fixed-title {
        font-size: 3rem !important;
        font-weight: 800 !important;
        color: #152038 !important;
        line-height: 1.4 !important;
        margin-bottom: 20px !important;
      }

      .vibe-fixed-subtitle {
        font-size: 1.4rem !important;
        color: #5b6e81 !important;
        line-height: 1.6 !important;
      }
    </style>
  </head>
  <body>
    
    <div id="app"></div>

    <div class="vibe-fixed-hero">
      <h1 class="vibe-fixed-title">
        더 가볍고 세련되게 진화한<br>
        <span style="color: #00b0ec;">쉐어밸류 차세대 부킹엔진</span>
      </h1>
      <p class="vibe-fixed-subtitle">
        정신없던 레거시 동영상을 걷어내고 본질만 담았습니다.<br>
        대표님이 직접 리드하는 바이브 코딩 실험실입니다.
      </p>
    </div>

    <script type="module" crossorigin src="https://sharevalue.github.io/assets/index.b271c582.js"></script>

    <script>
      // 기존 시스템이 켜진 후, 옛날 동영상 박스를 지우고 위 새 텍스트를 메인에 딱 꽂아넣는 마법의 스크립트
      window.addEventListener('load', function() {
        setTimeout(function() {
          const legacySection = document.querySelector('section');
          const myHero = document.querySelector('.vibe-fixed-hero');
          if (legacySection && myHero) {
            legacySection.parentNode.insertBefore(myHero, legacySection);
            legacySection.style.display = 'none';
          }
        }, 300); // 0.3초 대기 후 교체
      });
    </script>
  </body>
</html>
