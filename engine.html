<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #152038;
            -webkit-font-smoothing: antialiased;
        }

        /* 🔹 1. 상단 헤더 메뉴 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            box-sizing: border-box;
            z-index: 10000;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #152038;
            letter-spacing: -0.5px;
            text-decoration: none;
        }
        nav {
            display: flex;
            gap: 35px;
        }
        nav a {
            text-decoration: none;
            color: #5b6e81;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a.active {
            color: #00b0ec;
            font-weight: 700;
        }
        nav a:hover {
            color: #00b0ec;
        }
        .header-btn {
            background-color: #00b0ec;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 🔹 2. 레거시 동영상 제거 후 메인 영역 (강제 출력 설정) */
        .hero-section {
            margin-top: 80px !important;
            height: 75vh !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            text-align: center !important;
            background: linear-gradient(135deg, #ffffff 0%, #e6f7fd 100%) !important;
            padding: 0 20px !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .hero-title {
            font-size: 3.2rem !important;
            font-weight: 800 !important;
            color: #152038 !important;
            line-height: 1.4 !important;
            margin-bottom: 24px !important;
            letter-spacing: -1px !important;
        }
        .hero-title span {
            color: #00b0ec !important;
        }
        .hero-subtitle {
            font-size: 1.4rem !important;
            color: #5b6e81 !important;
            line-height: 1.6 !important;
            font-weight: 400 !important;
            margin-bottom: 40px !important;
        }
        .hero-btn {
            background-color: #152038 !important;
            color: #ffffff !important;
            border: none !important;
            padding: 16px 36px !important;
            font-size: 17px !important;
            font-weight: 700 !important;
            border-radius: 30px !important;
            cursor: pointer !important;
            box-shadow: 0 4px 15px rgba(21, 32, 56, 0.2) !important;
        }

        /* 🔹 3. 하단 푸터 */
        footer {
            background-color: #152038 !important;
            color: #ffffff !important;
            padding: 60px 40px !important;
            font-size: 14px !important;
            line-height: 1.8 !important;
            box-sizing: border-box !important;
        }
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-logo {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        .footer-info {
            color: #98a2ac;
            font-weight: 300;
        }
        .footer-copyright {
            margin-top: 20px;
            color: #5b6e81;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-text">SHAREVALUE</a>

    <section class="hero-section">

            트렌디한 여행 비즈니스의 시작<br>
            <span>범용 온라인 항공 예약 솔루션</span>

        <p class="hero-subtitle">

        </p>
        <button class="hero-btn">엔진 시연 신청하기</button>
    </section>

    <footer>
        <div class="footer-container">
            <div class="footer-logo">(주) 쉐어밸류</div>
            <div class="footer-info">
                사업자등록번호 : 750-86-00899 | 통신판매업번호 : 제2020-서울중구-1067호<br>
                주소 : 서울특별시 중구 정동길 35, 3층 302호(정동, 두비빌딩) | 대표 : 조미숙
            </div>
            <div class="footer-copyright">
                Copyright © 2020 Sharevalue Co., Ltd. All rights reserved.
            </div>
        </div>
    </footer>

</body>
</html>
